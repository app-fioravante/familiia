<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Genealogia Fioravante</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #2C423F;
            --accent: #C47D57;
            --text-light: #F7F4EF;
            --font-main: 'Inter', sans-serif;
            --font-fancy: 'Dancing Script', cursive;
            --error-bg: #FDF2F2;
            --error-border: #E57373;
            --success-bg: #EDF7ED;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body, html { height: 100%; background-color: #FAF8F5; overflow: hidden; }
        #landing-page { display: flex; height: 100vh; width: 100vw; }
        .landing-left {
            flex: 1.2;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
        .title-container { text-align: center; color: var(--text-light); }
        .brand-name {
            display: block;
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -4px;
            line-height: 0.9;
            background: linear-gradient(180deg, #FFFFFF 0%, #D4D0C8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        .brand-subtitle { font-family: var(--font-fancy); font-size: 2.2rem; color: var(--accent); display: block; margin-top: -10px; }
        .landing-right {
            flex: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FAF8F5;
            padding: 1.5rem;
            overflow-y: auto;
        }
        .auth-card { width: 100%; max-width: 400px; }
        .auth-card h2 { font-weight: 700; font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        .auth-card p { color: #7A7571; font-size: 0.9rem; margin-bottom: 24px; }
        .input-group { margin-bottom: 1rem; }
        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #E5E0D8;
            border-radius: 10px;
            font-size: 1rem;
            background: #FFFFFF;
        }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,125,87,0.15); }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); background: #1F302D; }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-outline:hover { background: rgba(44,66,63,0.05); border-color: var(--accent); color: var(--accent); }
        .error-message { background: var(--error-bg); border-left: 4px solid var(--error-border); padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #C62828; margin-bottom: 16px; }
        .success-message { background: var(--success-bg); border-left: 4px solid #4CAF50; padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #1E4620; margin-bottom: 16px; }
        @media (max-width: 768px) {
            #landing-page { flex-direction: column; }
            .landing-left { padding: 2rem; flex: 0.8; }
            .brand-name { font-size: 3.5rem; }
            .brand-subtitle { font-size: 1.6rem; }
            .landing-right { flex: 1.2; }
        }
    </style>
</head>
<body>
<div id="landing-page">
    <div class="landing-left">
        <div class="title-container">
            <span class="brand-name">Fioravante</span>
            <span class="brand-subtitle">Historia de la familia</span>
        </div>
    </div>
    <div class="landing-right" id="authPanel"></div>
</div>

<script>
    // Configuración Firebase (igual para ambos)
    const firebaseConfig = {
        apiKey: "AIzaSyALUNOTt8Ex9j_eeDUtaPqWHmIk_j-VF08",
        authDomain: "familia-genealogia.firebaseapp.com",
        projectId: "familia-genealogia",
        storageBucket: "familia-genealogia.firebasestorage.app",
        messagingSenderId: "923693678578",
        appId: "1:923693678578:web:bfed5d66d564d00847356b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentMode = 'login';
    const authPanel = document.getElementById('authPanel');

    function showError(containerId, message) {
        const container = document.getElementById(containerId);
        if(container) {
            container.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            setTimeout(() => { if(document.getElementById(containerId)) document.getElementById(containerId).innerHTML = ''; }, 4000);
        }
    }
    function showSuccess(containerId, message) {
        const container = document.getElementById(containerId);
        if(container) {
            container.innerHTML = `<div class="success-message">✓ ${message}</div>`;
            setTimeout(() => { if(document.getElementById(containerId)) document.getElementById(containerId).innerHTML = ''; }, 3000);
        }
    }

    async function saveUserProfile(uid, nombre, apellido, email) {
        try {
            await db.collection('users').doc(uid).set({
                nombre, apellido, email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            return true;
        } catch(e) { console.error(e); return false; }
    }

    function redirectToApp() {
        window.location.href = "app.html";
    }

    // Render login
    function renderLoginView() {
        authPanel.innerHTML = `
            <div class="auth-card">
                <h2>Bienvenido</h2>
                <p>Ingresa tus credenciales para continuar</p>
                <div id="loginFeedback"></div>
                <form id="loginFormElement">
                    <div class="input-group"><input type="email" id="loginEmail" placeholder="Correo electrónico" required autocomplete="email"></div>
                    <div class="input-group"><input type="password" id="loginPassword" placeholder="Contraseña" required autocomplete="current-password"></div>
                    <button type="submit" class="btn-primary">Comenzar</button>
                </form>
                <button class="btn-outline" id="showRegisterBtn">➕ Nuevo usuario · Crear cuenta</button>
            </div>
        `;
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { showError('loginFeedback', 'Completa ambos campos.'); return; }
            const fbDiv = document.getElementById('loginFeedback');
            fbDiv.innerHTML = `<div class="success-message">⏳ Validando...</div>`;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Redirigir a app.html directamente
                redirectToApp();
            } catch(error) {
                let msg = 'Error. ';
                if(error.code === 'auth/user-not-found') msg = 'No existe cuenta con este correo.';
                else if(error.code === 'auth/wrong-password') msg = 'Contraseña incorrecta.';
                else if(error.code === 'auth/invalid-email') msg = 'Correo inválido.';
                else msg = error.message;
                showError('loginFeedback', msg);
            }
        });
        document.getElementById('showRegisterBtn').addEventListener('click', () => { currentMode = 'register'; renderRegisterView(); });
    }

    function renderRegisterView() {
        authPanel.innerHTML = `
            <div class="auth-card">
                <h2>Crear cuenta nueva</h2>
                <p>Registra tu legado en el árbol familiar Fioravante</p>
                <div id="registerFeedback"></div>
                <form id="registerFormElement">
                    <div class="input-group"><input type="text" id="regNombre" placeholder="Nombre" required></div>
                    <div class="input-group"><input type="text" id="regApellido" placeholder="Apellido" required></div>
                    <div class="input-group"><input type="email" id="regEmail" placeholder="Correo electrónico" required></div>
                    <div class="input-group"><input type="password" id="regPassword" placeholder="Contraseña (mínimo 6 caracteres)" required></div>
                    <div class="input-group"><input type="password" id="regConfirmPassword" placeholder="Confirmar contraseña" required></div>
                    <button type="submit" class="btn-primary">Registrarse</button>
                </form>
                <button class="btn-outline" id="backToLoginBtn">← Volver a inicio de sesión</button>
            </div>
        `;
        const regForm = document.getElementById('registerFormElement');
        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('regNombre').value.trim();
            const apellido = document.getElementById('regApellido').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            if(!nombre || !apellido || !email || !password) { showError('registerFeedback', 'Todos los campos son obligatorios.'); return; }
            if(password !== confirm) { showError('registerFeedback', 'Las contraseñas no coinciden.'); return; }
            if(password.length < 6) { showError('registerFeedback', 'Mínimo 6 caracteres.'); return; }
            const fbDiv = document.getElementById('registerFeedback');
            fbDiv.innerHTML = `<div class="success-message">⏳ Creando cuenta...</div>`;
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCred.user;
                await user.updateProfile({ displayName: `${nombre} ${apellido}` });
                await saveUserProfile(user.uid, nombre, apellido, email);
                // Redirigir a app tras registro exitoso
                redirectToApp();
            } catch(error) {
                let errorMsg = error.message;
                if(error.code === 'auth/email-already-in-use') errorMsg = 'Este correo ya está registrado.';
                else if(error.code === 'auth/weak-password') errorMsg = 'Contraseña débil.';
                showError('registerFeedback', errorMsg);
            }
        });
        document.getElementById('backToLoginBtn').addEventListener('click', () => { currentMode = 'login'; renderLoginView(); });
    }

    // Redirección si ya hay sesión activa
    auth.onAuthStateChanged((user) => {
        if(user) {
            // Si el usuario está autenticado y está en index, redirigir a app.html
            redirectToApp();
        } else {
            // Mostrar la pantalla de login
            if(currentMode === 'login') renderLoginView();
            else renderRegisterView();
        }
    });
</script>
</body>
</html>
