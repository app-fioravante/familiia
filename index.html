<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Genealogia Fioravante</title>
    <!-- Se actualizó Google Fonts para incluir Playfair Display en lugar de Dancing Script -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #2C423F;
            --accent: #C47D57;
            --subtitle-color: #E2B091; /* Nuevo color elegante para el subtítulo */
            --text-light: #F7F4EF;
            --font-main: 'Inter', sans-serif;
            --font-fancy: 'Playfair Display', serif; /* Tipografía más moderna y sofisticada */
            --error-bg: #FDF2F2;
            --error-border: #E57373;
            --success-bg: #EDF7ED;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body, html { height: 100%; background-color: #FAF8F5; overflow: hidden; }
        
        #landing-page { display: flex; height: 100vh; width: 100vw; }
        
        .landing-left {
            flex: 1.2;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }
        
        .title-container { text-align: center; color: var(--text-light); }
        
        .brand-name {
            display: block;
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -4px;
            line-height: 0.9;
            background: linear-gradient(180deg, #FFFFFF 0%, #D4D0C8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        /* Mejoras aplicadas al subtítulo */
        .brand-subtitle { 
            font-family: var(--font-fancy); 
            font-size: 1.8rem; 
            font-weight: 500;
            font-style: italic;
            color: var(--subtitle-color); 
            letter-spacing: 1.5px;
            display: block; 
            margin-top: 5px; 
            opacity: 0.95;
        }
        
        .landing-right {
            flex: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FAF8F5;
            padding: 1.5rem;
            overflow-y: auto;
        }
        
        .auth-card { width: 100%; max-width: 400px; }
        .auth-card h2 { font-weight: 700; font-size: 1.8rem; color: var(--primary); margin-bottom: 8px; }
        .auth-card p { color: #7A7571; font-size: 0.9rem; margin-bottom: 24px; }
        
        .input-group { margin-bottom: 1rem; }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E0D8;
            border-radius: 12px;
            font-size: 1rem;
            background: #FFFFFF;
            transition: all 0.3s ease;
        }
        
        input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(196, 125, 87, 0.15); 
        }

        /* Botones modernos */
        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(44, 66, 63, 0.2);
            margin-top: 0.5rem;
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            background: #1F302D; 
            box-shadow: 0 6px 16px rgba(44, 66, 63, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(44, 66, 63, 0.2);
        }

        .btn-invited {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .btn-invited:hover { 
            background: var(--accent); 
            color: white; 
            box-shadow: 0 4px 12px rgba(196, 125, 87, 0.2);
            transform: translateY(-2px);
        }

        .btn-invited:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(196, 125, 87, 0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: #A09C96;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E5E0D8;
        }

        .divider span {
            padding: 0 12px;
        }

        .error-message { background: var(--error-bg); border-left: 4px solid var(--error-border); padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #C62828; margin-bottom: 16px; }
        .success-message { background: var(--success-bg); border-left: 4px solid #4CAF50; padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #1E4620; margin-bottom: 16px; }
        
        @media (max-width: 768px) {
            #landing-page { flex-direction: column; }
            .landing-left { padding: 2rem; flex: 0.8; }
            .brand-name { font-size: 3.5rem; }
            .brand-subtitle { font-size: 1.4rem; }
            .landing-right { flex: 1.2; }
        }
        
        .floating-credit-modal {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #FFFFFF;
            border-left: 5px solid var(--accent, #C47D57);
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
            padding: 14px 22px;
            z-index: 10000;
            max-width: 280px;
            font-size: 0.88rem;
            line-height: 1.45;
            color: #1E2A2A;
            background-color: #fefcf9;
            transition: opacity 0.2s ease;
            text-align: center;
        }
        .floating-credit-modal .credit-line {
            display: block;
            text-align: center;
            margin: 0;
        }
        .floating-credit-modal strong { font-weight: 800; color: var(--primary); }
        @media (max-width: 640px) {
            .floating-credit-modal { top: 12px; right: 12px; max-width: 250px; padding: 10px 16px; font-size: 0.75rem; border-left-width: 4px; }
        }
    </style>
</head>
<body>
<div id="landing-page">
    <div class="landing-left">
        <div class="title-container">
            <span class="brand-name">Fioravante</span>
            <span class="brand-subtitle">Historia de una familia</span>
        </div>
    </div>
    <div class="landing-right" id="authPanel"></div>
</div>

<div id="infoCreditModal" class="floating-credit-modal">
    <span class="credit-line"><strong>Diseño y Programación:</strong></span>
    <span class="credit-line">Rómulo Fioravante</span>
    <span class="credit-line"><strong>Versión:</strong></span>
    <span class="credit-line">1.0.2026</span>
    <span class="credit-line">Posadas-Misiones</span>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALUNOTt8Ex9j_eeDUtaPqWHmIk_j-VF08",
        authDomain: "familia-genealogia.firebaseapp.com",
        projectId: "familia-genealogia",
        storageBucket: "familia-genealogia.firebasestorage.app",
        messagingSenderId: "923693678578",
        appId: "1:923693678578:web:bfed5d66d564d00847356b"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const authPanel = document.getElementById('authPanel');

    function showError(containerId, message) {
        const container = document.getElementById(containerId);
        if(container) {
            container.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            setTimeout(() => { if(document.getElementById(containerId)) document.getElementById(containerId).innerHTML = ''; }, 4000);
        }
    }

    function redirectToApp() {
        window.location.href = "app.html";
    }

    function renderLoginView() {
        authPanel.innerHTML = `
            <div class="auth-card">
                <h2>Bienvenido</h2>
                <p>Ingresa tus credenciales para editar el árbol</p>
                <div id="loginFeedback"></div>
                <form id="loginFormElement">
                    <div class="input-group">
                        <input type="email" id="loginEmail" placeholder="Correo electrónico" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="Contraseña" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                </form>
                
                <div class="divider">
                    <span>O</span>
                </div>
                
                <button type="button" class="btn btn-invited" id="guestBtn">👤 Ingresar como invitado</button>
            </div>
        `;

        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if(!email || !password) { showError('loginFeedback', 'Completa ambos campos.'); return; }
            
            const fbDiv = document.getElementById('loginFeedback');
            fbDiv.innerHTML = `<div class="success-message">⏳ Validando...</div>`;
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                redirectToApp();
            } catch(error) {
                let msg = 'Error. ';
                if(error.code === 'auth/user-not-found') msg = 'No existe cuenta con este correo.';
                else if(error.code === 'auth/wrong-password') msg = 'Contraseña incorrecta.';
                else if(error.code === 'auth/invalid-email') msg = 'Correo inválido.';
                else msg = error.message;
                showError('loginFeedback', msg);
            }
        });

        document.getElementById('guestBtn').addEventListener('click', () => { 
            redirectToApp(); 
        });
    }

    // Lógica para ocultar los créditos después de 4 segundos
    const modalElement = document.getElementById('infoCreditModal');
    if (modalElement) {
        setTimeout(() => {
            if (modalElement && modalElement.remove) modalElement.remove();
            else if (modalElement && modalElement.style) modalElement.style.display = 'none';
        }, 4000);
    }

    // Observador de estado de autenticación
    auth.onAuthStateChanged((user) => {
        if(user) {
            redirectToApp();
        } else {
            renderLoginView();
        }
    });
</script>
</body>
</html>
