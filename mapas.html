<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mapas de Ciudades · Genealogía</title>
    <!-- Tipografía exclusiva: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Leaflet CSS y JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2C423F;
            --accent: #C47D57;
            --text-dark: #1E2A2A;
            --text-soft: #4a5b58;
            --bg-white: #FFFFFF;
            --border-light: #E5E0D8;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
            --font-main: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: var(--bg-white);
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* ========= PANEL IZQUIERDO (sidebar) ========= */
        .sidebar {
            width: 340px;
            background-color: var(--bg-white);
            color: var(--primary);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            padding: 24px 0 20px 0;
            overflow-y: auto;
            z-index: 10;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px 12px 24px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
        }

        .sidebar h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin: 0;
        }

        .reset-map-btn {
            background: transparent;
            border: 1.5px solid var(--accent);
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .reset-map-btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.02);
        }

        .search-box {
            padding: 0 20px 20px 20px;
        }

        .filter-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1.5px solid var(--border-light);
            border-radius: 60px;
            background-color: var(--bg-white);
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .filter-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(196, 125, 87, 0.15);
        }

        .city-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 16px 20px 16px;
        }

        .city-item {
            background: #F9F7F4;
            margin-bottom: 10px;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            color: var(--primary);
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .city-item:hover {
            background: #FDF8F4;
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .city-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary);
        }

        .city-count {
            background: rgba(44, 66, 63, 0.08);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* ========= ÁREA DEL MAPA ========= */
        .map-area {
            flex: 1;
            position: relative;
            background: #fefefe;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #f5f3ef;
        }

        /* Botón menú hamburguesa (solo móvil) */
        .mobile-menu-btn {
            display: none;
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 50;
            background: white;
            border: none;
            border-radius: 40px;
            width: 48px;
            height: 48px;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            font-size: 1.8rem;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .mobile-menu-btn:hover {
            background: #f5f2ef;
        }

        /* Overlay oscuro para cerrar sidebar en móvil */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            z-index: 350;
            backdrop-filter: blur(3px);
        }

        /* ========= PANEL LATERAL DERECHO (ancestros) ========= */
        .ancestor-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 380px;
            max-width: 90vw;
            height: 100%;
            background: var(--bg-white);
            color: var(--text-dark);
            box-shadow: -8px 0 28px rgba(0, 0, 0, 0.12);
            z-index: 300;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-left: 5px solid var(--accent);
            font-family: var(--font-main);
        }

        .ancestor-panel.active {
            transform: translateX(0);
        }

        .panel-header {
            background: #FEFAF6;
            padding: 22px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
        }

        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            color: var(--primary);
        }

        .panel-close-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--primary);
            font-size: 1.5rem;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-close-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #FFFFFF;
        }

        .person-row {
            background: #F9F8F6;
            margin-bottom: 12px;
            padding: 14px 18px;
            border-radius: 28px;
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .person-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--primary);
        }

        .person-year {
            font-weight: 500;
            color: var(--accent);
            font-size: 0.8rem;
            background: rgba(196, 125, 87, 0.12);
            padding: 2px 12px;
            border-radius: 30px;
        }

        .panel-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            background: #FEFAF6;
            text-align: right;
        }

        .btn-cerrar {
            background: transparent;
            border: 1.5px solid var(--accent);
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
        }

        .btn-cerrar:hover {
            background: var(--accent);
            color: white;
        }

        .panel-empty {
            text-align: center;
            color: var(--text-soft);
            padding: 40px 20px;
        }

        /* LOADING */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: var(--primary);
            font-weight: 600;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(44, 66, 63, 0.15);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========= RESPONSIVE: MÓVIL ========= */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 85%;
                max-width: 320px;
                height: 100%;
                z-index: 400;
                transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                box-shadow: var(--shadow-md);
                border-right: none;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-menu-btn {
                display: flex;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .map-area {
                width: 100%;
            }

            .reset-map-btn {
                padding: 5px 12px;
                font-size: 0.7rem;
            }

            .title-container h1 {
                font-size: 1.5rem;
            }

            /* Ajustes del panel de ancestros en móvil */
            .ancestor-panel {
                width: 100vw;
                max-width: 100vw;
                border-left: none;
                border-top-left-radius: 20px;
                border-bottom-left-radius: 20px;
            }

            .panel-header h2 {
                font-size: 1.25rem;
            }

            .city-item {
                padding: 10px 16px;
            }
        }

        /* Escritorio: el botón hamburguesa nunca se muestra */
        @media (min-width: 769px) {
            .mobile-menu-btn, .sidebar-overlay {
                display: none !important;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Botón menú para móvil -->
    <button class="mobile-menu-btn" id="menuToggleBtn" aria-label="Mostrar lista de ciudades">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- Panel izquierdo: lista de ciudades -->
    <aside id="sidebar" class="sidebar">
        <div class="title-container">
            <h1>🌍 Mapas</h1>
            <button id="resetMapBtn" class="reset-map-btn" title="Restablecer vista del mapa">⟳ Reiniciar</button>
        </div>
        <div class="search-box">
            <input type="text" id="citySearchInput" class="filter-input" placeholder="🔍 Filtrar ciudad...">
        </div>
        <div id="cityListContainer" class="city-list">
            <div style="padding: 30px; text-align: center; color: var(--primary);">⏳ Cargando ciudades...</div>
        </div>
    </aside>

    <!-- Mapa principal -->
    <main class="map-area">
        <div id="map"></div>
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <div>Geolocalizando & construyendo mapa familiar...</div>
        </div>

        <!-- Panel lateral de ancestros -->
        <div id="ancestorPanel" class="ancestor-panel">
            <div class="panel-header">
                <h2 id="panelCityTitle">📜 Ancestros</h2>
                <button class="panel-close-btn" id="closePanelBtn">&times;</button>
            </div>
            <div class="panel-body" id="panelBodyContent">
                <div class="panel-empty">Selecciona una ciudad para ver los nacidos allí</div>
            </div>
            <div class="panel-footer">
                <button class="btn-cerrar" id="closePanelFooterBtn">Cerrar</button>
            </div>
        </div>
    </main>
</div>

<script>
    // --------------------------------------------------------------
    // CONFIGURACIÓN FIREBASE (mismas credenciales)
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyALUNOTt8Ex9j_eeDUtaPqWHmIk_j-VF08",
        authDomain: "familia-genealogia.firebaseapp.com",
        projectId: "familia-genealogia",
        storageBucket: "familia-genealogia.firebasestorage.app",
        messagingSenderId: "923693678578",
        appId: "1:923693678578:web:bfed5d66d564d00847356b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ---------- VARIABLES GLOBALES ----------
    let map = null;
    let allCities = [];        // { id, name, lat, lng, count, persons: [] }
    let markersLayer = null;
    let mapInitialized = false;

    // DOM elements
    const cityListContainer = document.getElementById('cityListContainer');
    const searchInput = document.getElementById('citySearchInput');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const ancestorPanel = document.getElementById('ancestorPanel');
    const panelCityTitle = document.getElementById('panelCityTitle');
    const panelBodyContent = document.getElementById('panelBodyContent');
    const closePanelBtn = document.getElementById('closePanelBtn');
    const closePanelFooterBtn = document.getElementById('closePanelFooterBtn');
    const resetMapBtn = document.getElementById('resetMapBtn');
    const sidebar = document.getElementById('sidebar');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    // Helper: normalizar texto (sin tildes, minúsculas)
    function normalizeString(str) {
        if (!str) return '';
        return str.toLowerCase()
            .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
            .replace(/[^\w\s]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function cityMatches(cityName, searchTerm) {
        if (!searchTerm) return true;
        return normalizeString(cityName).includes(normalizeString(searchTerm));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Cerrar sidebar en móvil (si está abierta)
    function closeSidebarMobile() {
        if (sidebar && sidebar.classList) {
            sidebar.classList.remove('open');
            if (sidebarOverlay) sidebarOverlay.classList.remove('active');
        }
    }

    function openSidebarMobile() {
        if (window.innerWidth <= 768) {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }
    }

    // Eventos para menú móvil
    if (menuToggleBtn) {
        menuToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (sidebar.classList.contains('open')) {
                closeSidebarMobile();
            } else {
                openSidebarMobile();
            }
        });
    }
    if (sidebarOverlay) {
        sidebarOverlay.addEventListener('click', closeSidebarMobile);
    }
    // Al hacer clic en un item de ciudad (en móvil cerrar sidebar después)
    // Se manejará en renderCityList agregando un callback extra

    // Render lista de ciudades
    function renderCityList(filterText = '') {
        if (!allCities.length) {
            cityListContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#2C423F;">🌍 No hay ciudades con datos genealógicos aún.</div>';
            return;
        }
        let filtered = allCities.filter(city => cityMatches(city.name, filterText));
        if (filtered.length === 0) {
            cityListContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#2C423F;">🔍 Ninguna ciudad coincide.</div>';
            return;
        }
        filtered.sort((a, b) => a.name.localeCompare(b.name));
        let html = '';
        filtered.forEach(city => {
            html += `
                <div class="city-item" data-id="${escapeHtml(city.id)}">
                    <span class="city-name">📍 ${escapeHtml(city.name)}</span>
                    <span class="city-count">${city.count} ${city.count === 1 ? 'persona' : 'personas'}</span>
                </div>
            `;
        });
        cityListContainer.innerHTML = html;

        // Asignar eventos click
        document.querySelectorAll('.city-item').forEach(el => {
            const id = el.getAttribute('data-id');
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const city = allCities.find(c => c.id === id);
                if (!city) return;
                // Centrar mapa
                if (city.lat && city.lng && map) {
                    map.setView([city.lat, city.lng], 12);
                }
                // Abrir panel de ancestros
                openAncestorPanel(city);
                // En móvil, cerrar sidebar después de seleccionar
                closeSidebarMobile();
            });
        });
    }

    // Panel de ancestros
    function openAncestorPanel(city) {
        panelCityTitle.textContent = `${city.name}  •  ${city.count} ${city.count === 1 ? 'ancestro' : 'ancestros'}`;
        if (!city.persons || city.persons.length === 0) {
            panelBodyContent.innerHTML = '<div class="panel-empty">📜 No hay registros de nacimiento detallados para esta ciudad.</div>';
        } else {
            const sorted = [...city.persons].sort((a, b) => (a.fullName || '').localeCompare(b.fullName || ''));
            let rowsHtml = '';
            sorted.forEach(person => {
                const nameSafe = escapeHtml(person.fullName || 'Nombre no registrado');
                const yearSafe = person.birthYear ? escapeHtml(String(person.birthYear)) : 'año desconocido';
                rowsHtml += `
                    <div class="person-row">
                        <span class="person-name">👤 ${nameSafe}</span>
                        <span class="person-year">📅 ${yearSafe}</span>
                    </div>
                `;
            });
            panelBodyContent.innerHTML = rowsHtml;
        }
        ancestorPanel.classList.add('active');
    }

    function closeAncestorPanel() {
        ancestorPanel.classList.remove('active');
    }

    closePanelBtn.addEventListener('click', closeAncestorPanel);
    closePanelFooterBtn.addEventListener('click', closeAncestorPanel);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && ancestorPanel.classList.contains('active')) closeAncestorPanel();
    });

    // Ajustar mapa a todos los puntos
    function resetMapView() {
        if (!map || !allCities.length) return;
        const citiesWithCoords = allCities.filter(c => c.lat && c.lng);
        if (citiesWithCoords.length > 0) {
            const bounds = L.latLngBounds(citiesWithCoords.map(c => [c.lat, c.lng]));
            if (bounds.isValid()) map.fitBounds(bounds.pad(0.1));
            else map.setView([-27.3666, -55.8969], 5);
        } else {
            map.setView([-27.3666, -55.8969], 5);
        }
    }

    function resetFullView() {
        if (searchInput) searchInput.value = '';
        renderCityList('');
        if (mapInitialized) updateMarkers();
        resetMapView();
        closeSidebarMobile();   // en móvil cierra el menú al reiniciar
    }

    // Actualizar marcadores en el mapa
    function updateMarkers() {
        if (!map || !allCities.length) return;
        if (markersLayer) map.removeLayer(markersLayer);
        markersLayer = L.layerGroup().addTo(map);
        const searchTerm = searchInput.value.trim();
        let filtered = allCities.filter(city => cityMatches(city.name, searchTerm));
        filtered.forEach(city => {
            if (city.lat && city.lng) {
                const popupHtml = `
                    <b style="font-family: 'Inter'; color: #2C423F;">📍 ${escapeHtml(city.name)}</b><br>
                    <span style="font-size:0.85rem;">👥 ${city.count} registros</span><br>
                    <i style="font-size:0.75rem; color:#C47D57;">Toca en la lista para detalles</i>
                `;
                const marker = L.marker([city.lat, city.lng]).bindPopup(popupHtml);
                marker.addTo(markersLayer);
            }
        });
        if (filtered.length > 0 && !searchTerm && mapInitialized) {
            const group = L.featureGroup();
            filtered.forEach(city => {
                if (city.lat && city.lng) group.addLayer(L.marker([city.lat, city.lng]));
            });
            if (group.getLayers().length) map.fitBounds(group.getBounds().pad(0.15));
        }
    }

    // Geocodificación con Nominatim
    async function geocodeCity(cityName) {
        const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityName)}&format=json&limit=1&addressdetails=0`;
        try {
            const response = await fetch(url, { headers: { 'User-Agent': 'FioravanteGenealogy/1.0' } });
            const data = await response.json();
            if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            return null;
        } catch (error) {
            console.warn(`Error geocodificando ${cityName}:`, error);
            return null;
        }
    }

    // Cargar datos desde Firestore y geocodificar
    async function loadAndGeocodeCities() {
        try {
            const snapshot = await db.collection("persons").get();
            if (snapshot.empty) {
                cityListContainer.innerHTML = '<div style="padding:20px; text-align:center;">📭 No hay personas en el árbol aún.</div>';
                if (loadingOverlay) loadingOverlay.style.display = 'none';
                return;
            }

            const cityMap = new Map();
            snapshot.forEach(doc => {
                const data = doc.data();
                let birthPlace = data.birthPlace ? data.birthPlace.trim() : null;
                if (!birthPlace) return;
                const normKey = normalizeString(birthPlace);
                let fullName = data.fullName || '';
                if (!fullName && (data.firstName || data.lastName)) fullName = [data.firstName, data.lastName].filter(Boolean).join(' ');
                if (!fullName && data.name) fullName = data.name;
                if (!fullName) fullName = 'Ancestro sin nombre';
                let birthYear = data.birthYear ? data.birthYear : null;
                if (!birthYear && data.birthDate) {
                    try {
                        if (data.birthDate && typeof data.birthDate.toDate === 'function') birthYear = data.birthDate.toDate().getFullYear();
                        else if (typeof data.birthDate === 'string') birthYear = new Date(data.birthDate).getFullYear();
                    } catch(e) {}
                }
                const personInfo = { id: doc.id, fullName, birthYear };
                if (cityMap.has(normKey)) {
                    const entry = cityMap.get(normKey);
                    entry.count += 1;
                    entry.persons.push(personInfo);
                } else {
                    cityMap.set(normKey, { rawName: birthPlace, count: 1, persons: [personInfo] });
                }
            });

            if (cityMap.size === 0) {
                cityListContainer.innerHTML = '<div style="padding:20px;">🌎 No se encontraron ciudades asociadas.</div>';
                if (loadingOverlay) loadingOverlay.style.display = 'none';
                return;
            }

            if (loadingOverlay) loadingOverlay.style.display = 'flex';
            const totalCities = cityMap.size;
            let processed = 0;
            const citiesArray = [];

            for (let [normKey, cityInfo] of cityMap.entries()) {
                processed++;
                if (loadingOverlay) {
                    loadingOverlay.innerHTML = `<div class="spinner"></div><div>🗺️ Geocodificando: ${processed}/${totalCities} · ${escapeHtml(cityInfo.rawName)}</div>`;
                }
                const coords = await geocodeCity(cityInfo.rawName);
                citiesArray.push({
                    id: normKey,
                    name: cityInfo.rawName,
                    lat: coords ? coords.lat : null,
                    lng: coords ? coords.lng : null,
                    count: cityInfo.count,
                    persons: cityInfo.persons
                });
                await new Promise(r => setTimeout(r, 180));
            }

            allCities = citiesArray;
            if (loadingOverlay) loadingOverlay.style.display = 'none';
            renderCityList('');
            if (mapInitialized && map) {
                updateMarkers();
                const valid = allCities.filter(c => c.lat && c.lng);
                if (valid.length) {
                    const bounds = L.latLngBounds(valid.map(c => [c.lat, c.lng]));
                    if (bounds.isValid()) map.fitBounds(bounds.pad(0.1));
                }
            }
        } catch (error) {
            console.error(error);
            cityListContainer.innerHTML = `<div style="padding:20px; color:var(--accent);">⚠️ Error: ${error.message}</div>`;
            if (loadingOverlay) loadingOverlay.style.display = 'none';
        }
    }

    // Inicializar mapa
    function initMap() {
        map = L.map('map').setView([-27.3666, -55.8969], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 18,
            minZoom: 3
        }).addTo(map);
        mapInitialized = true;
        if (allCities.length > 0) {
            updateMarkers();
            const citiesWithCoords = allCities.filter(c => c.lat && c.lng);
            if (citiesWithCoords.length) {
                const bounds = L.latLngBounds(citiesWithCoords.map(c => [c.lat, c.lng]));
                if (bounds.isValid()) map.fitBounds(bounds.pad(0.1));
            }
        }
    }

    // Eventos
    searchInput.addEventListener('input', () => {
        renderCityList(searchInput.value);
        if (mapInitialized) updateMarkers();
    });

    resetMapBtn.addEventListener('click', () => {
        resetFullView();
    });

    // Cerrar sidebar si se hace clic fuera del mapa (útil en móvil)
    document.addEventListener('touchstart', (e) => {
        if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
            if (!sidebar.contains(e.target) && e.target !== menuToggleBtn && !menuToggleBtn.contains(e.target)) {
                closeSidebarMobile();
            }
        }
    });

    // Ejecutar carga
    (async () => {
        await loadAndGeocodeCities();
        initMap();
    })();
</script>
</body>
</html>
