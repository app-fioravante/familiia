<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fioravante en Italia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #F5F7F5;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; width: 100%; background: #F5F7F5; }
        .left-panel {
            flex: 0.3;
            background: #FFFFFF;
            border-right: 5px solid #1C3F32;
            padding: 0 1rem 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100%;
        }
        .center-panel {
            flex: 0.7;
            background: #F5F7F5;
            padding: 1.8rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .sticky-header {
            position: sticky;
            top: 0;
            background: #FFFFFF;
            z-index: 15;
            padding: 1.2rem 0 0.8rem 0;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid #E2EBE7;
        }
        .title-origen {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1C3F32;
            letter-spacing: -0.3px;
            border-left: 5px solid #1C3F32;
            padding-left: 1rem;
            line-height: 1.2;
            margin: 0;
        }
        .city-list { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 0.5rem; }
        .city-card {
            background: #FCFEFD;
            border: 1.5px solid #D0E0D8;
            border-radius: 20px;
            padding: 0.9rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .city-card:hover { background: #EFF5F2; transform: translateX(4px); border-color: #1C3F32; }
        .city-card.selected-city {
            background: #1C3F3220;
            border: 2px solid #1C3F32;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .city-name { font-weight: 700; font-size: 1rem; color: #1C3F32; }
        .region-badge {
            background: #EFF5F2;
            border-radius: 60px;
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1C3F32;
        }
        .map-container, .section-container {
            background: #FFFFFF;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.2rem;
            border: 1px solid #E2EBE7;
        }
        .map-container iframe {
            width: 100%;
            height: 280px;
            border-radius: 20px;
            border: none;
        }
        .section-container h3 { margin-bottom: 0.8rem; color: #1C3F32; }
        .item-list { display: flex; flex-direction: column; gap: 0.5rem; }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 0.7rem 0;
            border-bottom: 1px solid #E2EBE7;
        }
        .item-row:last-child { border-bottom: none; }
        .item-info { flex: 1; }
        .item-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1C3F32;
            margin-bottom: 0.2rem;
        }
        .item-desc { font-size: 0.8rem; color: #4A6A5C; }
        .item-link {
            background: #1C3F3210;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1C3F32;
            transition: background 0.2s;
            white-space: nowrap;
            margin-left: 0.8rem;
        }
        .item-link:hover { background: #1C3F32; color: white; }
        .empty-placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
            min-height: 400px;
            color: #1C3F32;
        }
        .empty-placeholder strong {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1C3F32 0%, #4A6A5C 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .app-container { flex-direction: column; height: auto; }
            .left-panel, .center-panel { flex: none; width: 100%; border-right: none; border-bottom: 5px solid #1C3F32; max-height: 45vh; overflow-y: auto; }
            .item-row { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .item-link { margin-left: 0; align-self: flex-start; }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .city-card, .map-container, .section-container {
            animation: fadeSlideUp 0.25s ease;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="left-panel">
        <div class="sticky-header">
            <div>
                <h1 class="title-origen">🇮🇹 Referencias en Italia</h1>
            </div>
            <p style="font-size:0.8rem; color:#5C7A6A; margin-top: 0.2rem;">
                Registros demográficos e históricos exactos del apellido en Italia.
            </p>
        </div>
        <div id="citiesContainer" class="city-list"></div>
    </div>

    <div class="center-panel" id="centerPanel">
        <div class="empty-placeholder">
            <strong>📜 Linaje Fioravante</strong>
            <span>Selecciona un núcleo geográfico para ver mapas y datos exactos en español</span>
        </div>
    </div>
</div>

<script>
    // ==================== DATOS COMPROBADOS EXCLUSIVAMENTE DE FIORAVANTE ====================
    const ciudadesData = [
        { 
            id: "caserta", 
            nombre: "Caserta", 
            region: "Campania", 
            contexto: "Campania es estadísticamente la región con mayor presencia del apellido exacto y singular 'Fioravante' en el sur de Italia, consolidado como un apellido independiente en los registros civiles locales.",
            personajes: [
                { nombre: "Distribución del Apellido Fioravante", descripcion: "Plataforma internacional de heráldica y árboles genealógicos en español que analiza el volumen y dispersión del apellido singular.", url: "https://www.familysearch.org/es/surname?surname=Fioravante" }
            ],
            lugares: [
                { nombre: "Mapa de Densidad: Fioravante en Caserta", descripcion: "Enlace cartográfico configurado en español enfocado en los núcleos familiares registrados con la terminación exacta en 'e'.", url: "https://www.google.com/maps/search/Fioravante,+Caserta,+Italia/?hl=es" }
            ]
        },
        { 
            id: "napoles", 
            nombre: "Nápoles", 
            region: "Campania", 
            contexto: "Históricamente, los registros de migración interna identifican a Nápoles como el punto de documentación e intercambio mercantil de las familias Fioravante originarias de las zonas rurales circundantes.",
            personajes: [
                { nombre: "Archivo Histórico Documental", descripcion: "Análisis etimológico en español sobre la raíz del nombre germánico convertido en apellido (Fioravante) en el Reino de Nápoles.", url: "https://es.wikipedia.org/wiki/Fioravanti#Origen" }
            ],
            lugares: [
                { nombre: "Mapa de Registros: Fioravante en Nápoles", descripcion: "Geolocalización en español de archivos y referencias civiles que contienen de forma explícita el apellido Fioravante.", url: "https://www.google.com/maps/search/Fioravante,+Napoli,+Italia/?hl=es" }
            ]
        },
        { 
            id: "salerno", 
            nombre: "Salerno", 
            region: "Campania", 
            contexto: "Junto con Caserta y Nápoles, la provincia de Salerno consolida el núcleo de mayor densidad histórica del apellido singular Fioravante, frecuentemente registrado en actas de la región costera.",
            personajes: [
                { nombre: "Genealogía de Campania - Salerno", descripcion: "Búsqueda en registros genealógicos (NMD) italianos con un enfoque específico en las provincias del sur.", url: "https://www.familysearch.org/es/search/record/results?q.surname=Fioravante&q.surname.exact=on&q.place=Salerno%2C%20Campania%2C%20Italy" }
            ],
            lugares: [
                { nombre: "Fioravante en la Provincia de Salerno", descripcion: "Mapa demográfico interactivo enfocado en los núcleos familiares del área salernitana.", url: "https://www.google.com/maps/search/Fioravante,+Salerno,+Italia/?hl=es" }
            ]
        },
        { 
            id: "foggia", 
            nombre: "Foggia", 
            region: "Apulia (Puglia)", 
            contexto: "En la región de Apulia, particularmente en la provincia de Foggia, el apellido Fioravante presenta núcleos poblacionales estables con registros históricos que datan de antiguos asentamientos agrícolas y comerciales del sur.",
            personajes: [
                { nombre: "Portal Antenati - Archivos del Estado", descripcion: "Sistema de Archivos de Estado italianos donde figuran las partidas de nacimiento y matrimonio de la familia Fioravante.", url: "https://antenati.cultura.gov.it/?lang=es" }
            ],
            lugares: [
                { nombre: "Mapa de Registros: Fioravante en Foggia", descripcion: "Geolocalización en español de archivos y referencias civiles en la región de Apulia.", url: "https://www.google.com/maps/search/Fioravante,+Foggia,+Italia/?hl=es" }
            ]
        },
        { 
            id: "roma", 
            nombre: "Roma", 
            region: "Lacio (Lazio)", 
            contexto: "Como gran centro administrativo y capital, Roma y la región del Lacio han sido históricamente un foco de migración interna, albergando numerosas ramas de la familia Fioravante en registros parroquiales y notariales.",
            personajes: [
                { nombre: "Censos Históricos y Genealogía (Cognomix)", descripcion: "Mapeo genealógico de las familias asentadas en el centro de Italia que mantienen la terminación singular en 'e'.", url: "https://www.cognomix.it/mappe-dei-cognomi-italiani/FIORAVANTE/LAZIO" }
            ],
            lugares: [
                { nombre: "Mapa de Distribución: Lacio", descripcion: "Filtro cartográfico directo para la búsqueda del término Fioravante en los alrededores de la capital italiana.", url: "https://www.google.com/maps/search/Fioravante,+Roma,+Italia/?hl=es" }
            ]
        },
        { 
            id: "treviso", 
            nombre: "Treviso", 
            region: "Véneto", 
            contexto: "Foco del norte de Italia. En esta zona el apellido coexistió con formas derivadas. A diferencia del sur, aquí aparece estrechamente ligado a topónimos medievales derivados del nombre propio Fioravante.",
            personajes: [
                { nombre: "Evolución Lingüística del Apellido", descripcion: "Explicación del desarrollo filológico en castellano del nombre propio 'Fioravante' hacia su fijación como apellido familiar.", url: "https://es.wikipedia.org/wiki/Fioravanti#Etimolog%C3%ADa" }
            ],
            lugares: [
                { nombre: "Mapa de Ubicación: Treviso", descripcion: "Filtro cartográfico directo en idioma español que destaca las menciones y registros en la provincia de Treviso.", url: "https://www.google.com/maps/search/Fioravante,+Treviso,+Italia/?hl=es" }
            ]
        },
        { 
            id: "vicenza", 
            nombre: "Vicenza", 
            region: "Véneto", 
            contexto: "Comparte con Treviso la historia filológica del norte italiano, documentando menciones y registros asignados al término exacto Fioravante en medio de otras formas derivadas.",
            personajes: [
                { nombre: "Archivos Históricos del Véneto", descripcion: "Registros regionales donde el apellido singular aparece referenciado históricamente.", url: "https://es.wikipedia.org/wiki/Fioravanti#Etimolog%C3%ADa" }
            ],
            lugares: [
                { nombre: "Mapa de Ubicación: Vicenza", descripcion: "Geolocalización en español de archivos y presencia actual en Vicenza.", url: "https://www.google.com/maps/search/Fioravante,+Vicenza,+Italia/?hl=es" }
            ]
        },
        { 
            id: "benevento", 
            nombre: "Benevento", 
            region: "Campania", 
            contexto: "Al estar inmersa en la región con la principal concentración demográfica del apellido, cuenta con una sólida base histórica de actas de estado civil (nacimientos y defunciones) que mantienen la ortografía inalterada en 'e'.",
            personajes: [
                { nombre: "Archivos del Estado - Benevento", descripcion: "Registros históricos oficiales que documentan a los portadores del apellido en la provincia.", url: "https://antenati.cultura.gov.it/?lang=es" }
            ],
            lugares: [
                { nombre: "Fioravante en Benevento", descripcion: "Mapeo geográfico de familias asentadas en esta área de la Campania.", url: "https://www.google.com/maps/search/Fioravante,+Benevento,+Italia/?hl=es" }
            ]
        },
        { 
            id: "avellino", 
            nombre: "Avellino", 
            region: "Campania", 
            contexto: "Zona que documenta el asentamiento rural y desarrollo agrario de las familias sureñas, en cuyos archivos comunales y eclesiásticos ha permanecido registrada la variante 'Fioravante' hasta la actualidad.",
            personajes: [
                { nombre: "Registros Parroquiales y Comunales", descripcion: "Búsqueda en registros genealógicos italianos con foco en la zona de Avellino.", url: "https://www.familysearch.org/es/search/record/results?q.surname=Fioravante&q.place=Avellino%2C%20Italy" }
            ],
            lugares: [
                { nombre: "Mapa Demográfico: Avellino", descripcion: "Localización cartográfica de las referencias territoriales del apellido.", url: "https://www.google.com/maps/search/Fioravante,+Avellino,+Italia/?hl=es" }
            ]
        },
        { 
            id: "bari", 
            nombre: "Bari", 
            region: "Apulia (Puglia)", 
            contexto: "Como puerto y centro urbano clave al sureste, registra la presencia actual e histórica del apellido exacto 'Fioravante' como resultado de los movimientos comerciales y de migración interna conectados directamente con Foggia.",
            personajes: [
                { nombre: "Censos Históricos y Comerciales", descripcion: "Mapeo genealógico de familias asentadas en la región portuaria de Apulia.", url: "https://www.cognomix.it/mappe-dei-cognomi-italiani/FIORAVANTE/PUGLIA" }
            ],
            lugares: [
                { nombre: "Distribución en Bari", descripcion: "Filtro cartográfico para explorar registros del término en la ciudad y provincia de Bari.", url: "https://www.google.com/maps/search/Fioravante,+Bari,+Italia/?hl=es" }
            ]
        }
    ];

    let currentCityId = null;
    const citiesContainer = document.getElementById('citiesContainer');
    const centerPanel = document.getElementById('centerPanel');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&', '<':'<', '>':'>' }[m] || m));
    }

    function renderCityDetail(city) {
        if (!city) return;
        
        // Mapa interactivo embebido forzado en idioma español usando el parámetro hl=es
        const mapSrc = `https://maps.google.com/maps?q=${encodeURIComponent(city.nombre + ", " + city.region + ", Italia Fioravante")}&t=&z=11&ie=UTF8&iwloc=&output=embed&hl=es`;
        
        let personajesHtml = '';
        if (city.personajes && city.personajes.length > 0) {
            let items = '';
            for (let p of city.personajes) {
                items += `
                    <div class="item-row">
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(p.nombre)}</div>
                            <div class="item-desc">${escapeHtml(p.descripcion)}</div>
                        </div>
                        <a class="item-link" href="${p.url}" target="_blank" rel="noopener noreferrer">🔗 Consultar Datos (ES)</a>
                    </div>
                `;
            }
            personajesHtml = `<div class="section-container"><h3>👤 Referencias y Archivos de Genealogía</h3><div class="item-list">${items}</div></div>`;
        }
        
        let lugaresHtml = '';
        if (city.lugares && city.lugares.length > 0) {
            let items = '';
            for (let l of city.lugares) {
                items += `
                    <div class="item-row">
                        <div class="item-info">
                            <div class="item-name">${escapeHtml(l.nombre)}</div>
                            <div class="item-desc">${escapeHtml(l.descripcion)}</div>
                        </div>
                        <a class="item-link" href="${l.url}" target="_blank" rel="noopener noreferrer">🗺️ Ver Mapa Completo (ES)</a>
                    </div>
                `;
            }
            lugaresHtml = `<div class="section-container"><h3>📊 Distribución Cartográfica del Apellido</h3><div class="item-list">${items}</div></div>`;
        }
        
        const finalHtml = `
            <div class="section-container" style="background:#EFF5F2; border-left: 5px solid #1C3F32; padding: 1.5rem;">
                <h3 style="margin-bottom: 0.5rem;">📜 Presencia de la variante FIORAVANTE</h3>
                <p class="item-desc" style="font-size:1rem; color:#1C3F32; line-height: 1.6;">${escapeHtml(city.contexto)}</p>
            </div>
            
            ${personajesHtml}
            ${lugaresHtml}

            <div class="map-container">
                <h3>🗺️ Mapa de Localización Geográfica (Visualización en Español)</h3>
                <iframe src="${mapSrc}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        `;
        centerPanel.innerHTML = finalHtml;
    }
    
    function renderCityList() {
        let html = '';
        for (let city of ciudadesData) {
            const selectedClass = (currentCityId === city.id) ? 'selected-city' : '';
            html += `
                <div class="city-card ${selectedClass}" data-city-id="${city.id}">
                    <span class="city-name">${escapeHtml(city.nombre)}</span>
                    <span class="region-badge">${escapeHtml(city.region)}</span>
                </div>
            `;
        }
        citiesContainer.innerHTML = html;
        
        document.querySelectorAll('.city-card').forEach(card => {
            card.addEventListener('click', () => {
                const cityId = card.getAttribute('data-city-id');
                const selectedCity = ciudadesData.find(c => c.id === cityId);
                if (selectedCity) {
                    currentCityId = cityId;
                    renderCityList();
                    renderCityDetail(selectedCity);
                }
            });
        });
    }
    
    function init() {
        renderCityList();
        if (ciudadesData.length > 0) {
            currentCityId = ciudadesData[0].id;
            renderCityList();
            renderCityDetail(ciudadesData[0]);
        }
    }
    
    document.querySelector('.title-origen')?.addEventListener('click', () => {
        currentCityId = null;
        renderCityList();
        centerPanel.innerHTML = `<div class="empty-placeholder"><strong>🇮🇹 Linaje Fioravante</strong><span>Selecciona un núcleo geográfico para explorar registros verificados en español</span></div>`;
    });
    
    init();
</script>
</body>
</html>
