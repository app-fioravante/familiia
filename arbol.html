<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Árbol Genealógico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #F5F7F5;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: #F5F7F5;
        }

        /* PANEL IZQUIERDO */
        .left-panel {
            flex: 0.85;
            background: #FFFFFF;
            border-right: 5px solid #2A5C4A;
            padding: 1.5rem 1rem 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            height: 100%;
        }

        .title-origen {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #1C3F32;
            margin-bottom: 1.8rem;
            letter-spacing: -0.3px;
            border-left: 5px solid #2A5C4A;
            padding-left: 1rem;
            line-height: 1.2;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .title-origen:hover {
            opacity: 0.85;
        }

        .year-group {
            margin-bottom: 2.2rem;
            animation: fadeSlideUp 0.3s ease;
        }

        .group-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #10261E;
            background: #EFF5F2;
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            margin-bottom: 1.2rem;
            letter-spacing: -0.3px;
            border-left: 4px solid #2A5C4A;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .group-cards {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .card-module {
            position: relative;
            background: #FCFEFD;
            border-radius: 20px;
            padding: 0.9rem 1rem 0.9rem 1rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1C3F32;
            border: 1.5px solid #D0E0D8;
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: 85px;
        }

        .birth-year-badge {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 1rem;
            font-weight: 800;
            background: rgba(42, 92, 74, 0.15);
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            color: #174432;
        }

        .full-name-card {
            font-weight: 700;
            font-size: 0.95rem;
            color: #10261E;
            margin-top: 0.3rem;
        }

        .card-module.selected-card {
            border: 2.5px solid #132A21;
            background: #FFFFFF;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.1);
        }

        .card-module.dimmed-card {
            background: #E7EFEB;
            border-color: #C2D2CA;
            color: #7B9689;
            opacity: 0.8;
        }

        /* PANEL DERECHO */
        .right-panel {
            flex: 1.5;
            background: #F5F7F5;
            display: flex;
            flex-direction: column;
            padding: 2rem 2.2rem 2rem 2.2rem;
            overflow-y: auto;
        }

        .details-container {
            background: #FFFFFF;
            border-radius: 36px;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.06);
            padding: 2rem 2.2rem;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            border: 1px solid #E2EBE7;
        }

        .detail-text {
            font-family: 'Inter', sans-serif;
            color: #1E2E28;
            line-height: 1.65;
            font-size: 1.05rem;
        }
        .detail-text strong {
            color: #246148;
            font-weight: 700;
        }
        .detail-text .birth-date-bold {
            font-weight: 800;
            color: #0E4C38;
        }
        .detail-highlight {
            background: #EEF4F1;
            border-left: 5px solid #2A5C4A;
            padding: 1.2rem 1.5rem;
            border-radius: 24px;
            margin: 1rem 0;
        }
        .empty-detail {
            text-align: center;
            padding: 2rem;
            color: #4A6A5C;
        }

        /* Botones de acción */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }
        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .btn-edit {
            background: #2A5C4A;
            color: white;
        }
        .btn-edit:hover {
            background: #1C3F32;
            transform: scale(0.98);
        }
        .btn-print {
            background: #EFF5F2;
            color: #1C3F32;
            border: 1px solid #C2D2CA;
        }
        .btn-print:hover {
            background: #DFE9E4;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 {
            margin-bottom: 1.2rem;
            color: #1C3F32;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #D0E0D8;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1rem;
        }
        @media print {
            .left-panel, .action-buttons, .modal, .title-origen {
                display: none !important;
            }
            .right-panel {
                flex: 1;
                padding: 0;
                margin: 0;
            }
            .details-container {
                box-shadow: none;
                border: none;
                padding: 0;
            }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="left-panel">
        <h1 class="title-origen">Árbol Genealógico</h1>
        <div id="groupsContainer" class="groups-list">Cargando ancestros...</div>
    </div>
    <div class="right-panel">
        <div id="rightDetails" class="details-container">
            <div class="empty-detail">
                <strong>Explora tu legado</strong><br><br>
                Selecciona un ancestro de la izquierda para ver su biografía, fechas y lugar de origen.
            </div>
        </div>
    </div>
</div>

<!-- Modal para editar -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Editar ancestro</h3>
        <input type="text" id="editFirstName" placeholder="Nombre">
        <input type="text" id="editLastName" placeholder="Apellido">
        <input type="date" id="editBirthDate">
        <input type="text" id="editBirthPlace" placeholder="Lugar de nacimiento">
        <input type="date" id="editDeathDate">
        <select id="editGender">
            <option value="">Seleccionar género</option>
            <option value="male">Hombre</option>
            <option value="female">Mujer</option>
        </select>
        <textarea id="editBiography" rows="4" placeholder="Biografía"></textarea>
        <div class="modal-buttons">
            <button class="btn btn-print" id="modalCancel">Cancelar</button>
            <button class="btn btn-edit" id="modalSave">Guardar cambios</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyALUNOTt8Ex9j_eeDUtaPqWHmIk_j-VF08",
        authDomain: "familia-genealogia.firebaseapp.com",
        projectId: "familia-genealogia",
        storageBucket: "familia-genealogia.firebasestorage.app",
        messagingSenderId: "923693678578",
        appId: "1:923693678578:web:bfed5d66d564d00847356b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allPersons = [];
    let currentSelectedId = null;
    let currentPersonData = null;

    const groupsContainer = document.getElementById('groupsContainer');
    const rightDetailsDiv = document.getElementById('rightDetails');
    const editModal = document.getElementById('editModal');

    const YEAR_RANGES = [
        { label: "1740 — 1800", min: 1740, max: 1800 },
        { label: "1801 — 1900", min: 1801, max: 1900 },
        { label: "1901 — 2000", min: 1901, max: 2000 },
        { label: "2001 — Actualidad", min: 2001, max: 3000 }
    ];

    // Función para extraer año
    function extractYear(birthDate) {
        if (!birthDate) return null;
        if (typeof birthDate === 'object' && birthDate !== null && 'seconds' in birthDate) {
            const date = new Date(birthDate.seconds * 1000);
            return date.getFullYear();
        }
        if (typeof birthDate === 'string') {
            const match = birthDate.match(/\d{4}/);
            if (match) return parseInt(match[0], 10);
        }
        if (typeof birthDate === 'number') return birthDate;
        return null;
    }

    // Formateo a DD/MM/AAAA con zona horaria Argentina (UTC-3)
    function formatDateToDMY(dateValue) {
        if (!dateValue) return 'Desconocida';
        let d;
        if (typeof dateValue === 'object' && dateValue !== null && 'seconds' in dateValue) {
            d = new Date(dateValue.seconds * 1000);
        } else if (typeof dateValue === 'string') {
            d = new Date(dateValue);
            if (isNaN(d.getTime())) return dateValue;
        } else if (typeof dateValue === 'number') {
            d = new Date(dateValue);
        } else {
            return String(dateValue);
        }
        if (isNaN(d.getTime())) return 'Fecha inválida';
        // Usar toLocaleDateString con zona Argentina para evitar desfase
        return d.toLocaleDateString('es-AR', { timeZone: 'America/Argentina/Buenos_Aires', year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    // Convertir fecha YYYY-MM-DD (input date) a Timestamp de Firebase (UTC)
    function dateInputToTimestamp(dateString) {
        if (!dateString) return null;
        const [year, month, day] = dateString.split('-');
        // Crear fecha a las 12:00 UTC para evitar problemas de zona horaria
        const date = new Date(Date.UTC(parseInt(year), parseInt(month)-1, parseInt(day), 12, 0, 0));
        return firebase.firestore.Timestamp.fromDate(date);
    }

    // Renderizar detalles con botones editar/imprimir
    function renderPersonDetailsInRightPanel(person, docId) {
        if (!person) {
            rightDetailsDiv.innerHTML = `<div class="empty-detail">Información no disponible.</div>`;
            return;
        }
        const fullName = `${person.firstName || ''} ${person.lastName || ''}`.trim() || "Ancestro sin nombre";
        const birthYearDisplay = person.birthYear ? person.birthYear : (extractYear(person.birthDate) || "?");
        const birthPlace = person.birthPlace ? person.birthPlace : "No especificado";
        const deathDateFormatted = person.deathDate ? formatDateToDMY(person.deathDate) : "—";
        const birthDateFormatted = person.birthDate ? formatDateToDMY(person.birthDate) : "Desconocida";
        let genderText = "";
        if (person.gender === 'female') genderText = "Mujer";
        else if (person.gender === 'male') genderText = "Hombre";
        else genderText = "Persona";

        let bioHtml = `
            <div class="action-buttons">
                <button class="btn btn-print" id="printBtn">Imprimir</button>
                <button class="btn btn-edit" id="editBtn">Editar</button>
            </div>
            <div class="detail-text" id="printableArea">
                <p><strong style="font-size:1.4rem;">${escapeHtml(fullName)}</strong><br>
                <span style="background:#EFF5F2; padding:0.2rem 0.8rem; border-radius:30px; font-size:0.85rem;">Nacido/a en ${birthYearDisplay} · ${genderText}</span></p>
                <p><span class="birth-date-bold">Fecha de nacimiento:</span> ${birthDateFormatted}<br>
                <strong>Lugar de nacimiento:</strong> ${escapeHtml(birthPlace)}<br>
                <strong>Fecha de fallecimiento:</strong> ${deathDateFormatted}</p>
        `;
        if (person.biography && person.biography.trim() !== "") {
            bioHtml += `<div class="detail-highlight"><strong>Reseña biográfica:</strong><br>${escapeHtml(person.biography)}</div>`;
        } else {
            bioHtml += `<div class="detail-highlight">${escapeHtml(fullName)} forma parte del legado familiar. Sus huellas perduran en la memoria.</div>`;
        }
        bioHtml += `</div>`;
        rightDetailsDiv.innerHTML = bioHtml;

        // Asignar eventos después de inyectar HTML
        document.getElementById('editBtn')?.addEventListener('click', () => openEditModal(docId, person));
        document.getElementById('printBtn')?.addEventListener('click', () => {
            window.print();
        });
    }

    // Abrir modal con datos actuales
    function openEditModal(docId, person) {
        currentSelectedId = docId;
        currentPersonData = { ...person };
        document.getElementById('editFirstName').value = person.firstName || '';
        document.getElementById('editLastName').value = person.lastName || '';
        // Convertir birthDate a YYYY-MM-DD si existe
        let birthDateStr = '';
        if (person.birthDate) {
            let d;
            if (typeof person.birthDate === 'object' && person.birthDate.seconds) {
                d = new Date(person.birthDate.seconds * 1000);
            } else if (typeof person.birthDate === 'string') {
                d = new Date(person.birthDate);
            }
            if (d && !isNaN(d.getTime())) {
                birthDateStr = d.toISOString().split('T')[0];
            }
        }
        document.getElementById('editBirthDate').value = birthDateStr;
        document.getElementById('editBirthPlace').value = person.birthPlace || '';
        let deathDateStr = '';
        if (person.deathDate) {
            let d2;
            if (typeof person.deathDate === 'object' && person.deathDate.seconds) {
                d2 = new Date(person.deathDate.seconds * 1000);
            } else if (typeof person.deathDate === 'string') {
                d2 = new Date(person.deathDate);
            }
            if (d2 && !isNaN(d2.getTime())) {
                deathDateStr = d2.toISOString().split('T')[0];
            }
        }
        document.getElementById('editDeathDate').value = deathDateStr;
        document.getElementById('editGender').value = person.gender || '';
        document.getElementById('editBiography').value = person.biography || '';
        editModal.style.display = 'flex';
    }

    // Guardar cambios en Firestore
    async function savePersonChanges() {
        if (!currentSelectedId) return;
        const updatedData = {
            firstName: document.getElementById('editFirstName').value,
            lastName: document.getElementById('editLastName').value,
            birthPlace: document.getElementById('editBirthPlace').value,
            gender: document.getElementById('editGender').value,
            biography: document.getElementById('editBiography').value,
        };
        const birthDateInput = document.getElementById('editBirthDate').value;
        if (birthDateInput) {
            updatedData.birthDate = dateInputToTimestamp(birthDateInput);
            const year = new Date(birthDateInput).getFullYear();
            updatedData.birthYear = year;
        } else {
            updatedData.birthDate = null;
            updatedData.birthYear = null;
        }
        const deathDateInput = document.getElementById('editDeathDate').value;
        if (deathDateInput) {
            updatedData.deathDate = dateInputToTimestamp(deathDateInput);
        } else {
            updatedData.deathDate = null;
        }

        try {
            await db.collection("persons").doc(currentSelectedId).update(updatedData);
            // Recargar datos
            await loadAndGroupPersons();
            editModal.style.display = 'none';
            // Mantener selección actualizada
            const updatedPerson = allPersons.find(p => p.id === currentSelectedId)?.person;
            if (updatedPerson) {
                renderPersonDetailsInRightPanel(updatedPerson, currentSelectedId);
                applyCardSelection(currentSelectedId);
            }
        } catch (error) {
            console.error("Error al actualizar:", error);
            alert("Error al guardar: " + error.message);
        }
    }

    function applyCardSelection(selectedDocId) {
        const allCards = document.querySelectorAll('.card-module');
        allCards.forEach(card => card.classList.remove('selected-card', 'dimmed-card'));
        if (!selectedDocId) return;
        const targetCard = document.querySelector(`.card-module[data-id="${selectedDocId}"]`);
        if (targetCard) {
            targetCard.classList.add('selected-card');
            allCards.forEach(card => {
                if (card !== targetCard) card.classList.add('dimmed-card');
            });
        }
    }

    function onPersonCardClick(person, docId) {
        currentSelectedId = docId;
        renderPersonDetailsInRightPanel(person, docId);
        applyCardSelection(docId);
    }

    function groupPersonsByYearRange(personsArray) {
        const groups = YEAR_RANGES.map(r => ({ ...r, items: [] }));
        let extraGroup = { label: "Anteriores a 1740 o sin fecha", min: -Infinity, max: 1739, items: [] };
        for (let item of personsArray) {
            const person = item.person;
            let year = person.birthYear ?? extractYear(person.birthDate);
            let assigned = false;
            if (year !== null && typeof year === 'number') {
                for (let group of groups) {
                    if (year >= group.min && year <= group.max) {
                        group.items.push(item);
                        assigned = true;
                        break;
                    }
                }
                if (!assigned && year < 1740) extraGroup.items.push(item);
                else if (!assigned && year > 3000) groups[groups.length-1].items.push(item);
            } else {
                extraGroup.items.push(item);
            }
        }
        const finalGroups = groups.filter(g => g.items.length > 0);
        if (extraGroup.items.length) finalGroups.push(extraGroup);
        return finalGroups;
    }

    function renderGroupedCards(groupsArray) {
        if (!groupsArray.length) {
            groupsContainer.innerHTML = `<div class="empty-message" style="padding:1.5rem;">No se encontraron ancestros.</div>`;
            return;
        }
        let globalHtml = '';
        for (let group of groupsArray) {
            if (!group.items.length) continue;
            group.items.sort((a,b) => (a.person.birthYear ?? extractYear(a.person.birthDate) ?? 9999) - (b.person.birthYear ?? extractYear(b.person.birthDate) ?? 9999));
            let cardsHtml = '';
            for (let item of group.items) {
                const person = item.person;
                const fullName = `${person.firstName || ''} ${person.lastName || ''}`.trim() || "Anónimo";
                const year = person.birthYear ?? extractYear(person.birthDate) ?? "?";
                cardsHtml += `
                    <div class="card-module" data-id="${item.id}">
                        <div class="birth-year-badge">${escapeHtml(String(year))}</div>
                        <div class="full-name-card">${escapeHtml(fullName)}</div>
                    </div>
                `;
            }
            globalHtml += `
                <div class="year-group">
                    <div class="group-title">${escapeHtml(group.label)}</div>
                    <div class="group-cards">${cardsHtml}</div>
                </div>
            `;
        }
        groupsContainer.innerHTML = globalHtml;
        document.querySelectorAll('.card-module').forEach(card => {
            const docId = card.getAttribute('data-id');
            const found = allPersons.find(p => p.id === docId);
            if (found) card.addEventListener('click', (e) => { e.stopPropagation(); onPersonCardClick(found.person, docId); });
        });
        if (currentSelectedId) {
            const selected = allPersons.find(p => p.id === currentSelectedId);
            if (selected) {
                renderPersonDetailsInRightPanel(selected.person, currentSelectedId);
                applyCardSelection(currentSelectedId);
            } else {
                resetRightPanelToWelcome();
                applyCardSelection(null);
                currentSelectedId = null;
            }
        } else {
            resetRightPanelToWelcome();
        }
    }

    function resetRightPanelToWelcome() {
        rightDetailsDiv.innerHTML = `<div class="empty-detail"><strong>Legado familiar</strong><br><br>Selecciona un ancestro para ver sus datos.</div>`;
    }

    async function loadAndGroupPersons() {
        try {
            groupsContainer.innerHTML = "Cargando...";
            const snapshot = await db.collection("persons").get();
            if (snapshot.empty) {
                groupsContainer.innerHTML = "No hay registros.";
                allPersons = [];
                return;
            }
            const personsArray = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                personsArray.push({
                    id: doc.id,
                    person: {
                        firstName: data.firstName || "",
                        lastName: data.lastName || "",
                        birthDate: data.birthDate || null,
                        birthYear: data.birthYear ?? extractYear(data.birthDate),
                        birthPlace: data.birthPlace || "",
                        deathDate: data.deathDate || null,
                        biography: data.biography || "",
                        gender: data.gender || ""
                    }
                });
            });
            allPersons = personsArray;
            const grouped = groupPersonsByYearRange(allPersons);
            renderGroupedCards(grouped);
        } catch (error) {
            console.error(error);
            groupsContainer.innerHTML = `Error: ${error.message}`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }

    // Eventos modales
    document.getElementById('modalCancel')?.addEventListener('click', () => editModal.style.display = 'none');
    document.getElementById('modalSave')?.addEventListener('click', savePersonChanges);
    window.addEventListener('click', (e) => { if (e.target === editModal) editModal.style.display = 'none'; });

    document.querySelector('.title-origen')?.addEventListener('click', () => {
        currentSelectedId = null;
        resetRightPanelToWelcome();
        applyCardSelection(null);
    });

    loadAndGroupPersons();
</script>
</body>
</html>
